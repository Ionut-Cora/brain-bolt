<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>BrainBolt</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- favicons generated by favicon.io -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/images/favicon-16x16.png"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header>
      <div class="logo-div">
        <i class="fa-solid fa-brain"></i>
        <span>BrainBolt</span>
      </div>
    </header>

    <main>
      <div class="container">
        <!-- Start Section -->
        <section class="card" id="start-section">
          <h1>Start BrainBolt Quiz</h1>

          <form id="start-form">
            <label for="player-name">Your name</label>
            <input type="text" id="player-name" placeholder="Enter your name" />

            <label for="question-count">Number of questions</label>
            <select id="question-count">
              <option value="3">3 questions</option>
              <option value="6">6 questions</option>
              <option value="9">9 questions</option>
            </select>

            <label for="difficulty-level">Difficulty</label>
            <select id="difficulty-level">
              <option value="easy">Beginner</option>
              <option value="medium">Intermediate</option>
              <option value="hard">Hard</option>
            </select>
            <div class="btn-div">
              <button type="submit">Start</button>
            </div>
          </form>

          <!-- Error or loading messages -->
          <p id="message-text"></p>
        </section>

        <!-- Quiz Section -->
        <section class="card hidden" id="quiz-section">
          <div class="quiz-info">
            <p>
              Question: <span id="question-number">0</span>/<span
                id="total-questions"
                >0</span
              >
            </p>
            <p>Score: <span id="score">0</span></p>
            <p>Time: <span id="time">20</span>s</p>
          </div>

          <img id="question-image" src="" alt="Question image" />

          <h2 id="question"></h2>

          <div id="answers-content"></div>

          <!-- Feedback after the answer -->
          <div id="feedback-section" class="hidden">
            <h3 id="feedback-title"></h3>
            <p id="feedback-text"></p>
            <div class="btn-div">
              <button id="next-btn" type="button">Next</button>
            </div>
          </div>
        </section>

        <!-- Result Section -->
        <section class="card hidden" id="result-section">
          <h2>Quiz Complete</h2>
          <p id="result-text"></p>
          <div class="btn-div">
            <button id="restart-btn" type="button">Play Again</button>
          </div>
        </section>

        <!-- Leaderboard Section (Local Storage scores) -->
        <section class="card">
          <h2>Leaderboard</h2>
          <ol id="leaderboard"></ol>
          <div class="btn-div">
            <button id="clear-btn" type="button">Clear Scores</button>
          </div>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p>copyright &copy; BrainBolt 2026</p>
    </footer>

    <!-- Custom JavaScript -->
    <script src="assets/js/script.js"></script>

    <!-- Font Awesome kit -->
    <script
      src="https://kit.fontawesome.com/c9cae39e51.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
